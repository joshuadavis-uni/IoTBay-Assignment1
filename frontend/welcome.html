<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoTBay - Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome!</h1>
        <!-- This gets filled in by welcome.js with the user's name -->
        <p id="welcome_message">Loading...</p>
        <p id="user_email" style="color: #999; font-size: 13px;"></p>
        <p id="user_type" style="color: #999; font-size: 13px;"></p>

        <button class="btn" onclick="window.location.href='logout.html'" 
                style="margin-top: 20px;">
            Logout
        </button>
    </div>

    <script>
        // Read the user details stored in sessionStorage by login.js or register.js
        const full_name = sessionStorage.getItem('full_name');
        const email = sessionStorage.getItem('email');
        const user_type = sessionStorage.getItem('user_type');

        // If no session data exists, redirect back to home
        // This prevents people accessing welcome.html directly without logging in
        if (!full_name) {
            window.location.href = 'index.html';
        }

        // Display the user's details on the page
        document.getElementById('welcome_message').textContent = `Welcome, ${full_name}!`;
        document.getElementById('user_email').textContent = `Email: ${email}`;
        document.getElementById('user_type').textContent = `Account type: ${user_type}`;
    </script>
</body>
</html>
