<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoTBay - Logged Out</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Logged Out</h1>
        <p>You have been successfully logged out of IoTBay.</p>

        <button class="btn" onclick="window.location.href='index.html'">
            Return to Home
        </button>
    </div>

    <script>
        fetch('http://127.0.0.1:8080/auth/logout', {
            method: 'POST',
            credentials: 'include'
        });
        sessionStorage.clear();
    </script>
</body>
</html>
